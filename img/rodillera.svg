<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#0a0a1a" rx="8"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0055ff"/><stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <!-- rodillera izquierda -->
  <g transform="translate(150,150)">
    <ellipse cx="0" cy="0" rx="55" ry="70" fill="rgba(0,85,255,0.2)" stroke="url(#g)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="35" ry="50" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="rgba(255,215,0,0.1)" stroke="rgba(255,215,0,0.25)" stroke-width="2"/>
    <!-- correas -->
    <rect x="-55" y="-20" width="110" height="6" rx="3" fill="rgba(255,215,0,0.2)"/>
    <rect x="-55" y="15" width="110" height="6" rx="3" fill="rgba(255,215,0,0.2)"/>
    <!-- acolchado -->
    <circle cx="-20" cy="-25" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
    <circle cx="0" cy="-30" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
    <circle cx="20" cy="-25" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
    <circle cx="-20" cy="25" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
    <circle cx="0" cy="30" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
    <circle cx="20" cy="25" r="8" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>
  </g>
</svg>
